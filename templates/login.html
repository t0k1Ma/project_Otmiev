{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ОООтмыв</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <!-- ШАПКА -->
    <header class="header-auth">
        <div class="container">
            <div class="logo">
                <img src="{% static 'images/OOOtmiev.jpg' %}" alt="ОООтмыв" class="logo-img">
            </div>
        </div>
    </header>

    <!-- ФОРМА ВХОДА -->
    <main class="auth-main">
        <div class="auth-container">
            <h1 class="auth-title">Вход в личный кабинет</h1>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="login">Телефон или Email</label>
                    <input 
                        type="text" 
                        id="login" 
                        name="login" 
                        class="form-input"
                        placeholder="Введите телефон или email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input password-input"
                            placeholder="Введите пароль"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg class="eye-icon eye-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-icon eye-closed" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" class="checkbox">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="btn-login-submit">Войти</button>
            </form>
            
            <div class="auth-footer">
                <span class="no-account">Нет аккаунта?</span>
                <a href="/register/" class="register-link">Зарегистрироваться</a>
            </div>
        </div>
    </main>

    <!-- ФУТЕР -->
    <footer class="footer">
        <div class="footer-bottom">
            <div class="container">
                <p>Начиная использовать Сервис, вы принимаете Пользовательское соглашение и даёте согласие на обработку персональных данных.</p>
                <p>© ООО «Сервисные Системы» (2016-2026) Братья Чистовы ®</p>
            </div>
        </div>
    </footer>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
